name: Publish common

on:
  push:
    branches: [main]
    paths:
      - 'tiz-backend/common/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          sudo ln -sf /opt/gradle-9.3.1/bin/gradle /usr/local/bin/gradle
      
      - name: Publish to Aliyun Maven
        working-directory: tiz-backend/common
        env:
          ALIYUN_MAVEN_USERNAME: ${{ secrets.ALIYUN_MAVEN_USERNAME }}
          ALIYUN_MAVEN_PASSWORD: ${{ secrets.ALIYUN_MAVEN_PASSWORD }}
        run: gradle publish --no-daemon
