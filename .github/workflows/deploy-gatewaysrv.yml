name: Deploy gatewaysrv

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            mkdir -p /opt/dev/deploy/staging/gatewaysrv
            
            cat > /opt/dev/deploy/staging/gatewaysrv/docker-compose.yml << 'EOFCOMPOSE'
            services:
              gatewaysrv:
                image: registry.cn-hangzhou.aliyuncs.com/nxo/gatewaysrv:sha-${{ github.sha }}
                pull_policy: always
                container_name: tiz-gatewaysrv
                restart: always
                ports:
                  - "8080:8080"
                env_file:
                  - ../.env
                networks:
                  - npass
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"
            
            networks:
              npass:
                external: true
            EOFCOMPOSE
            
            cd /opt/dev/deploy/staging/gatewaysrv
            docker-compose pull
            docker-compose up -d
