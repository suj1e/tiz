name: Publish usersrv-api

on:
  push:
    branches: [main]
    paths:
      - 'tiz-backend/usersrv/api/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ALIYUN_MAVEN_USERNAME: ${{ secrets.ALIYUN_MAVEN_USERNAME }}
      ALIYUN_MAVEN_PASSWORD: ${{ secrets.ALIYUN_MAVEN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"
      
      - name: Publish to Aliyun Maven
        working-directory: tiz-backend/usersrv
        run: gradle :api:publish
