version: 2
updates:
  # Gradle - Java services
  - package-ecosystem: "gradle"
    directory: "/tiz-backend/auth-service"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      gradle-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "gradle"
