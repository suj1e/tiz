# Tiz Production Environment Deployment
# All application services (frontend + backend)
# Infrastructure (mysql, redis, kafka, nacos, es) is managed by infra/

services:
  # ==================== Frontend ====================
  tiz-web:
    image: registry.cn-hangzhou.aliyuncs.com/nxo/tiz-web:latest
    pull_policy: always
    container_name: tiz-web
    restart: always
    expose:
      - "80"
    networks:
      - npass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Gateway ====================
  gateway:
    image: registry.cn-hangzhou.aliyuncs.com/nxo/gateway:latest
    pull_policy: always
    container_name: tiz-gateway
    restart: always
    expose:
      - "80:8080"
    environment:
      - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos:8080}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE:-}
    networks:
      - npass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Auth Service ====================
  auth-service:
    image: registry.cn-hangzhou.aliyuncs.com/nxo/auth-service:latest
    pull_policy: always
    container_name: tiz-auth-service
    restart: always
    expose:
      - "8101:8101"
    environment:
      - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos:8080}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE:-}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - npass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Chat Service ====================
  chat-service:
    image: registry.cn-hangzhou.aliyuncs.com/nxo/chat-service:latest
    pull_policy: always
    container_name: tiz-chat-service
    restart: always
    expose:
      - "8102:8102"
    environment:
      - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos:8080}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE:-}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    networks:
      - npass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8102/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Content Service ====================
  content-service:
    image: registry.cn-hangzhou.aliyuncs.com/nxo/content-service:latest
    pull_policy: always
    container_name: tiz-content-service
    restart: always
    expose:
      - "8103:8103"
    environment:
      - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos:8080}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE:-}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - SPRING_ELASTICSEARCH_URPORT=${SPRING_ELASTICSEARCH_URPORT:-elasticsearch:9200}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    networks:
      - npass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8103/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Practice Service ====================
  practice-service:
    image: registry.cn-hangzhou.aliyuncs.com/nxo/practice-service:latest
    pull_policy: always
    container_name: tiz-practice-service
    restart: always
    expose:
      - "8104:8104"
    environment:
      - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos:8080}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE:-}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    networks:
      - npass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8104/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Quiz Service ====================
  quiz-service:
    image: registry.cn-hangzhou.aliyuncs.com/nxo/quiz-service:latest
    pull_policy: always
    container_name: tiz-quiz-service
    restart: always
    expose:
      - "8105:8105"
    environment:
      - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos:8080}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE:-}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    networks:
      - npass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8105/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== LLM Service ====================
  llm-service:
    image: registry.cn-hangzhou.aliyuncs.com/nxo/llm-service:latest
    pull_policy: always
    container_name: tiz-llm-service
    restart: always
