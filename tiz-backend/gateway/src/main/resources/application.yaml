server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
        # Auth Service
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/v1/**
          filters:
            - StripPrefix=0

        # User Service
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/v1/**

        # Chat Service
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/v1/**

        # Content Service
        - id: content-service
          uri: lb://content-service
          predicates:
            - Path=/api/content/v1/**

        # Practice Service
        - id: practice-service
          uri: lb://practice-service
          predicates:
            - Path=/api/practice/v1/**

        # Quiz Service
        - id: quiz-service
          uri: lb://quiz-service
          predicates:
            - Path=/api/quiz/v1/**

    nacos:
      config:
        enabled: false
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:localhost:30848}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: Authorization,Content-Type,X-*
  allow-credentials: true
  max-age: 3600

# Whitelist paths (no authentication required)
gateway:
  whitelist:
    - /api/auth/v1/login
    - /api/auth/v1/register
    - /api/auth/v1/refresh
    - /actuator/**
