server:
  port: 8102

spring:
  application:
    name: chatsrv

  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:localhost:30848}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}

# SSE configuration
sse:
  timeout: 300000

# LLM service (Docker DNS, not in Nacos)
llm:
  service:
    url: ${LLM_SERVICE_URL:http://llmsrv:8106}

# Content service (Nacos service discovery)
content:
  service:
    url: ${CONTENT_SERVICE_URL:-http://contentsrv:8103}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800
  refresh-token-expiration: 604800
