server:
  port: 8104

spring:
  application:
    name: practice-service

  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:localhost:30848}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}

# Content service (Nacos service discovery)
content:
  service:
    url: ${CONTENT_SERVICE_URL:-http://contentsrv:8103}

# LLM service (Docker DNS, not in Nacos)
llm:
  service:
    url: ${LLM_SERVICE_URL:http://llmsrv:8106}
