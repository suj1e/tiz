services:
  llm-service:
    image: registry.cn-hangzhou.aliyuncs.com/nxo/llm-service:latest
    pull_policy: always
    container_name: tiz-llm-service
    restart: always
    ports:
      - "8106:8106"
    environment:
      # Nacos Discovery (optional, for service discovery)
      - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos:8080}
      - NACOS_NAMESPACE=${NACOS_NAMESPACE:-}

      # Database
      - DATABASE_URL=${DATABASE_URL:-mysql://root@mysql:3306/tiz}
      - DATABASE_PASSWORD=${MYSQL_PASSWORD}

      # Redis
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      # LLM Provider
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - npass
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  npass:
    external: true
