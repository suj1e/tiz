server:
  port: 8105

spring:
  application:
    name: quiz-service

  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:localhost:30848}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:30009}
    consumer:
      group-id: quiz-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    template:
      default-topic: quiz-events

# Content service (Nacos service discovery)
content:
  service:
    url: ${CONTENT_SERVICE_URL:lb://content-service}

# LLM service (Nacos service discovery)
llm:
  service:
    url: ${LLM_SERVICE_URL:lb://llm-service}

# Outbox configuration
outbox:
  scan-interval: 5000
  batch-size: 100
  max-retries: 3
